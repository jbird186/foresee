name: Run Tests

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            fasm \
            expect

      - name: Run examples
        run: chmod +x ./tests/test_outputs.sh && ./tests/test_outputs.sh "./examples/*.4c" "examples"

      - name: Run other tests
        run: chmod +x ./tests/test_outputs.sh && ./tests/test_outputs.sh "./tests/misc/*.4c" "misc"
